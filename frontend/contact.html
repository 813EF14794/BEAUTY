<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - santhiya Elegance</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><h2>Aura Elegance</h2></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="booking.html">Book Appointment</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li id="authLink"><a href="auth.html">Login/Register</a></li>
            </ul>
        </nav>
    </header>

    <section>
        <h2 class="section-title">Drop Us A Message</h2>
        <div id="alertBox" class="alert"></div>
        
        <div class="form-container">
            <form id="contactForm">
                <div class="form-group">
                    <label for="cName">Your Name</label>
                    <input type="text" id="cName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="cEmail">Your Email</label>
                    <input type="email" id="cEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="cMessage">Message</label>
                    <textarea id="cMessage" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Santhiya Elegance Parlour. All Rights Reserved.</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
